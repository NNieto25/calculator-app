services:
  backend:
    build: ./backend
    image: calculator-backend
    restart: unless-stopped
    environment:
      - PORT=8080
    ports:
      - "8080:8080"

  frontend:
    build: ./frontend
    image: calculator-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:80"
